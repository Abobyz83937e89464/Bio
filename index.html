<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio Web App - Morpheusov</title>
    <script src="[telegram.org](https://telegram.org/js/telegram-web-app.js)"></script>
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap)" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --accent-gray: rgba(255, 255, 255, 0.03);
            --smooth-curve: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .blob { 
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15; 
            animation: moveFast 2.5s infinite alternate ease-in-out; 
        }

        .blob:nth-child(1) { width: 350px; height: 350px; background: #ffffff; top: 10%; left: -10%; }
        .blob:nth-child(2) { width: 300px; height: 300px; background: #cccccc; bottom: 10%; right: -10%; animation-duration: 2s; }

        @keyframes moveFast {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(40px, 50px) scale(1.15); }
        }

        .glitch-text {
            display: inline-block;
            background: linear-gradient(90deg, #fff 0%, #777 50%, #fff 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            animation: shimmer 3s linear infinite, glitch-skew 4s infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        @keyframes glitch-skew { 
            0%, 93%, 100% { transform: skew(0deg); } 
            94% { transform: skew(-8deg); filter: brightness(1.2); } 
            96% { transform: skew(8deg); filter: brightness(0.8); } 
        }

        /* --- МУЗЫКАЛЬНЫЙ ВИДЖЕТ --- */
        .music-widget {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 50;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 24px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 18px;
            min-width: 250px;
        }

        .music-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: url('iconmusic.png') center/cover;
            border: 2px solid var(--glass-border);
            animation: rotateDisk 4s linear infinite;
            animation-play-state: paused;
        }

        .playing .music-icon { animation-play-state: running; }

        .wave-container {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 16px;
        }

        .bar {
            width: 4px;
            background: #fff;
            border-radius: 1.5px;
            height: 2px;
            animation: none;
        }

        /* Полоски по очереди с задержкой */
        .playing .bar:nth-child(1) { animation: dance 1s ease-in-out infinite 0s; }
        .playing .bar:nth-child(2) { animation: dance 1s ease-in-out infinite 0.2s; }
        .playing .bar:nth-child(3) { animation: dance 1s ease-in-out infinite 0.4s; }
        .playing .bar:nth-child(4) { animation: dance 1s ease-in-out infinite 0.6s; }
        .playing .bar:nth-child(5) { animation: dance 1s ease-in-out infinite 0.8s; }

        @keyframes dance {
            0%, 100% { height: 2px; }
            50% { height: 16px; }
        }

        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        #mainContent, .friend-card-full {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 380px;
            padding: 40px 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .seq-item { opacity: 0; transform: translateY(30px); }
        .seq-item.show { animation: fadeInUp 0.8s var(--smooth-curve) forwards; }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* --- АНИМАЦИЯ КНОПОК --- */
        .card, .contact-btn, .close-btn {
            transition: transform 0.4s var(--smooth-curve), background 0.3s ease, border-color 0.3s ease, box-shadow 0.4s ease;
            cursor: pointer;
            will-change: transform;
        }

        .card:hover, .contact-btn:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.25);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card:active, .contact-btn:active {
            transform: scale(0.92) translateY(2px);
            transition: transform 0.1s var(--smooth-curve);
        }

        /* --- ЭЛЕМЕНТЫ ПРОФИЛЯ --- */
        .avatar { width: 95px; height: 95px; border-radius: 50%; margin: 0 auto 20px auto; border: 1px solid var(--glass-border); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .name { font-size: 23px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.5px; }
        .username { font-size: 17px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); }
        .bio { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; line-height: 1.4; }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin: 20px 0 12px 0;
        }
        
        .card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            text-align: left;
            margin-bottom: 12px;
        }

        .card-icon { width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--glass-border); flex-shrink: 0; }
        .card-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
        .card-desc { font-size: 12px; color: var(--text-muted); }

        .contact-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            color: #fff;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
        }

        /* --- СТРАНИЦА ДРУГА (плавный переход) --- */
        #friendPage {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #friendPage.visible {
            opacity: 1;
            pointer-events: all;
        }

        .close-btn { 
            margin-top: 25px;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 10px;
        }

        /* --- ЛОАДЕР --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.05);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="music-widget" id="musicWidget" style="opacity:0; transform: translateY(-15px); transition: 1s var(--smooth-curve);">
        <div class="music-icon"></div>
        <div class="music-info">
            <div class="music-name glitch-text">free bands</div>
            <div class="wave-container">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
    </div>

    <div id="loader"><div class="spinner"></div></div>

    <div id="mainContent" style="display:none;">
        <div class="avatar seq-item" style="background: url('osnova.png') center/130% no-repeat; animation-delay: 0.1s;"></div>
        <h1 class="name seq-item" style="animation-delay: 0.2s;"><span class="glitch-text">Morpheusov.qmor</span></h1>
        <div class="username seq-item" style="animation-delay: 0.3s;"><span class="glitch-text">@Defbymorgenshtern</span></div>
        <p class="bio seq-item" style="animation-delay: 0.4s;">не отвечаю на метавопросы | @doverie_2</p>

        <div class="section-title seq-item" style="animation-delay: 0.5s;">Мои Проекты</div>
        <div class="card seq-item" style="animation-delay: 0.6s;" onclick="window.open('[t.me](https://t.me/doverie_2)', '_blank')">
            <div class="card-icon" style="background: url('canal.png') center/cover;"></div>
            <div class="card-info">
                <div class="card-title"><span class="glitch-text">Project | white pengvin</span></div>
                <div class="card-desc">@doverie_2</div>
            </div>
        </div>

        <div class="section-title seq-item" style="animation-delay: 0.7s;">Кенты</div>
        <div class="card seq-item" style="animation-delay: 0.8s;" onclick="openFriendPage()">
            <div class="card-icon" style="background: url('avadruna.png') center/cover;"></div>
            <div class="card-info">
                <div class="card-title">арт333р</div>
                <div class="card-desc">@suauis</div>
            </div>
        </div>

        <div class="contact-btn seq-item" style="animation-delay: 0.9s;" onclick="window.open('[t.me](https://t.me/Defbymorgenshtern)', '_blank')">
            Перейти в ЛС
        </div>
    </div>

    <!-- Страница друга -->
    <div id="friendPage">
        <div class="friend-card-full">
            <div class="avatar" style="background: url('avadruna.png') center/cover;"></div>
            <h1 class="name"><span class="glitch-text">арт333р</span></h1>
            <div class="username">@suauis</div>
            <p class="bio">люблю москву но снится биробиджан</p>
            
            <div class="section-title">Канал кента</div>
            <div class="card" onclick="window.open('[t.me](https://t.me/deluxgran)', '_blank')">
                <div class="card-icon" style="background: url('druncanal.png') center/cover;"></div>
                <div class="card-info">
                    <div class="card-title"><span class="glitch-text">Бомж</span></div>
                    <div class="card-desc">@deluxgran</div>
                </div>
            </div>
            
            <div class="close-btn" onclick="closeFriendPage()">[ Вернуться назад ]</div>
        </div>
    </div>

    <audio id="bgMusic" src="music.mp3" loop autoplay></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const audio = document.getElementById('bgMusic');
        const widget = document.getElementById('musicWidget');
        const mainContent = document.getElementById('mainContent');
        const friendPage = document.getElementById('friendPage');

        function openFriendPage() {
            // Плавно скрываем основной контент
            mainContent.style.transition = 'opacity 0.4s ease';
            mainContent.style.opacity = '0';
            mainContent.style.pointerEvents = 'none';
            setTimeout(() => {
                mainContent.style.display = 'none';
                friendPage.classList.add('visible');
            }, 400);
        }

        function closeFriendPage() {
            // Плавно скрываем страницу друга
            friendPage.classList.remove('visible');
            setTimeout(() => {
                mainContent.style.display = 'block';
                // Небольшая пауза чтобы display:block применился
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        mainContent.style.opacity = '1';
                        mainContent.style.pointerEvents = 'all';
                    });
                });
            }, 400);
        }

        let assetsLoaded = 0;
        const assets = ['osnova.png', 'canal.png', 'iconmusic.png', 'music.mp3', 'druncanal.png', 'avadruna.png'];
        
        function checkLoad() {
            assetsLoaded++;
            if (assetsLoaded >= assets.length) setTimeout(show, 500);
        }

        assets.forEach(src => {
            if (src.endsWith('.mp3')) { const a = new Audio(src); a.oncanplaythrough = checkLoad; }
            else { const i = new Image(); i.src = src; i.onload = checkLoad; i.onerror = checkLoad; }
        });

        function show() {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                mainContent.style.display = 'block';
                mainContent.style.opacity = '1';
                widget.style.opacity = '1';
                widget.style.transform = 'translateY(0)';
                document.querySelectorAll('.seq-item').forEach(el => el.classList.add('show'));
                audio.play().then(() => widget.classList.add('playing')).catch(() => {});
            }, 600);
        }

        document.body.addEventListener('click', () => { 
            if (audio.paused) { audio.play(); widget.classList.add('playing'); } 
        }, { once: false });
    </script>
</body>
</html>
