<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --accent-gray: rgba(255, 255, 255, 0.03);
            --smooth-curve: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            height: 100vh;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ФОН */
        .bg { position: fixed; width: 100%; height: 100%; overflow: hidden; z-index: 0; }
        .blob { 
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; 
            animation: moveFast 2.5s infinite alternate ease-in-out; 
        }
        .blob:nth-child(1) { width: 350px; height: 350px; background: #ffffff; top: 10%; left: -10%; }
        .blob:nth-child(2) { width: 300px; height: 300px; background: #cccccc; bottom: 10%; right: -10%; animation-duration: 2s; }
        @keyframes moveFast { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px, 50px) scale(1.15); } }

        /* ЗАГРУЗКА */
        #loader {
            position: fixed; inset: 0; 
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 100;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 1s var(--smooth-curve);
        }
        .spinner {
            width: 45px; height: 45px; border: 2px solid rgba(255,255,255,0.05);
            border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* МУЗЫКАЛЬНЫЙ ПЛЕЕР (ВОЗВРАТ ПОЛОСОК) */
        .music-widget {
            position: fixed; top: 25px; right: 25px; z-index: 50;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 16px 24px; border-radius: 25px;
            display: flex; align-items: center; gap: 18px;
            min-width: 250px; opacity: 0; transform: translateY(-10px);
            transition: all 1s var(--smooth-curve);
        }
        .music-widget.show { opacity: 1; transform: translateY(0); }
        .music-icon {
            width: 55px; height: 55px; border-radius: 50%;
            background: url('iconmusic.png') center/cover;
            border: 2px solid var(--glass-border);
            animation: rotateDisk 4s linear infinite;
            animation-play-state: paused; flex-shrink: 0;
        }
        .playing .music-icon { animation-play-state: running; }
        
        .wave-container { display: flex; align-items: flex-end; gap: 3px; height: 16px; }
        .bar { width: 4px; background: #fff; border-radius: 1.5px; height: 2px; }
        .playing .bar { animation: dance 1s ease-in-out infinite; }
        @keyframes dance { 0%, 100% { height: 2px; } 50% { height: 16px; } }
        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* КОНТЕЙНЕР */
        #mainContent {
            position: relative; z-index: 10; width: 92%; max-width: 380px;
            padding: 40px 25px; background: var(--glass-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 35px;
            text-align: center; display: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            max-height: 90vh; overflow-y: auto;
        }
        #mainContent::-webkit-scrollbar { width: 0; }

        .seq-item { opacity: 0; transform: translateY(30px); }
        .seq-item.show { animation: fadeInUp 0.8s var(--smooth-curve) forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* АВАТАРКА */
        .avatar {
            width: 95px; height: 95px; border-radius: 50%;
            background: url('osnova.png') center/130% no-repeat; 
            border: 1px solid var(--glass-border); margin: 0 auto 20px auto;
        }
        .name { font-size: 23px; font-weight: 800; margin-bottom: 4px; }
        .username { font-size: 17px; font-weight: 600; margin-bottom: 12px; display: block; }
        .glitch-text {
            display: inline-block; background: linear-gradient(90deg, #fff 0%, #666 50%, #fff 100%);
            background-size: 200% auto; color: transparent; -webkit-background-clip: text;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
        .bio { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; }

        /* КАРТОЧКИ (ПРОЕКТЫ & ДРУЗЬЯ) */
        .section-title { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 2px; margin: 20px 0 12px 0; }
        
        .card {
            display: flex; align-items: center; gap: 14px; padding: 16px;
            background: var(--accent-gray); border: 1px solid var(--glass-border);
            border-radius: 22px; text-align: left; cursor: pointer;
            transition: all 0.5s var(--smooth-curve);
            margin-bottom: 10px;
        }
        
        .card:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.25);
        }

        .card:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.12);
            transition: all 0.2s var(--smooth-curve);
        }

        .card-icon { width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--glass-border); flex-shrink: 0; }
        .card-info { flex-grow: 1; }
        .card-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
        .card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.3; }

        /* КНОПКА ЛС */
        .contact-btn {
            display: block; width: 100%; padding: 18px; margin-top: 15px;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border); border-radius: 22px;
            color: var(--text-main); font-size: 12px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2.5px; text-decoration: none;
            transition: all 0.5s var(--smooth-curve);
        }

        .contact-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.3);
        }

        .contact-btn:active {
            transform: scale(0.95);
            transition: all 0.2s var(--smooth-curve);
        }

        /* СПЕЦИФИКА КЕНТОВ */
        .friend-avatar { width: 46px; height: 46px; border-radius: 50%; margin-bottom: 5px; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>

    <div class="bg"><div class="blob"></div><div class="blob"></div></div>

    <div class="music-widget" id="musicWidget">
        <div class="music-icon"></div>
        <div class="music-info">
            <div class="music-name glitch-text">free bands</div>
            <div class="wave-container">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>
    </div>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div id="mainContent">
        <div class="avatar seq-item" style="animation-delay: 0.1s;"></div>
        <h1 class="name seq-item" style="animation-delay: 0.2s;"><span class="glitch-text">Morpheusov.qmor</span></h1>
        <div class="username seq-item" style="animation-delay: 0.3s;"><span class="glitch-text">@Defbymorgenshtern</span></div>
        <p class="bio seq-item" style="animation-delay: 0.4s;">не отвечаю на метавопросы | @doverie_2</p>

        <div class="section-title seq-item" style="animation-delay: 0.5s;">Мои Проекты</div>
        <div class="card seq-item" style="animation-delay: 0.6s;" onclick="window.open('https://t.me/doverie_2', '_blank')">
            <div class="card-icon" style="background: url('canal.png') center/cover;"></div>
            <div class="card-info">
                <div class="card-title">Project | white pengvin</div>
                <div class="card-desc">@doverie_2</div>
            </div>
        </div>

        <div class="section-title seq-item" style="animation-delay: 0.7s;">Кенты</div>
        <div class="card seq-item" style="animation-delay: 0.8s;" onclick="window.open('https://t.me/deluxgran', '_blank')">
            <div class="card-icon" style="background: url('avadruna.png') center/cover;"></div>
            <div class="card-info">
                <div class="card-title">арт333р (@suauis)</div>
                <div class="card-desc">люблю москву но снится биробиджан | Бомж</div>
            </div>
        </div>

        <div class="contact-btn seq-item" style="animation-delay: 0.9s;" onclick="window.open('https://t.me/Defbymorgenshtern', '_blank')">
            Перейти в ЛС
        </div>
    </div>

    <audio id="bgMusic" src="music.mp3" loop autoplay></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const audio = document.getElementById('bgMusic');
        const widget = document.getElementById('musicWidget');

        let assetsLoaded = 0;
        const assetsToLoad = ['osnova.png', 'canal.png', 'iconmusic.png', 'music.mp3', 'druncanal.png', 'avadruna.png'];
        
        function checkLoading() {
            assetsLoaded++;
            if (assetsLoaded >= assetsToLoad.length) {
                setTimeout(showContent, 400); 
            }
        }

        const fallbackTimer = setTimeout(() => {
            if (document.getElementById('loader').style.display !== 'none') showContent();
        }, 4000);

        assetsToLoad.forEach(src => {
            if (src.endsWith('.mp3')) {
                const a = new Audio(src);
                a.oncanplaythrough = checkLoading;
            } else {
                const img = new Image();
                img.src = src; img.onload = checkLoading; img.onerror = checkLoading; 
            }
        });

        function showContent() {
            clearTimeout(fallbackTimer);
            document.getElementById('loader').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                widget.classList.add('show');
                document.querySelectorAll('.seq-item').forEach(item => item.classList.add('show'));
                audio.play().then(() => widget.classList.add('playing')).catch(() => {});
            }, 600);
        }

        document.body.addEventListener('click', () => {
            if (audio.paused) { audio.play(); widget.classList.add('playing'); }
        }, { once: false });
    </script>
</body>
</html>
